<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1115">
<title>WatchPi</title>
<link rel="apple-touch-icon" href="/icon-180.png">
<link rel="icon" type="image/png" href="/icon-180.png">
<link rel="manifest" href='data:application/json,{"name":"WatchPi","short_name":"WatchPi","start_url":"/","display":"standalone","background_color":"%230f1115","theme_color":"%230f1115","icons":[{"src":"/icon-512.png","sizes":"512x512","type":"image/png"},{"src":"/icon-180.png","sizes":"180x180","type":"image/png"}]}'>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1f2430;
    --text: #e8eaf0; --muted: #8b93a7; --accent: #f5c518;
    --green: #3ecf8e; --red: #e5484d; --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text);
    font: 16px/1.45 -apple-system, "Segoe UI", Roboto, sans-serif;
    padding-bottom: calc(64px + env(safe-area-inset-bottom));
  }
  header {
    position: sticky; top: 0; z-index: 10; background: rgba(15,17,21,.92);
    backdrop-filter: blur(8px); padding: 12px 16px; display: flex;
    align-items: center; gap: 10px; border-bottom: 1px solid #262b36;
  }
  header h1 { font-size: 18px; font-weight: 700; }
  header h1 span { color: var(--accent); }
  header .spacer { flex: 1; }
  .iconbtn {
    background: none; border: none; color: var(--muted); font-size: 20px;
    cursor: pointer; padding: 6px;
  }
  .profilechip {
    background: var(--panel2); border: 1px solid #2a3040; color: var(--text);
    border-radius: 20px; padding: 6px 14px; font-size: 13.5px; font-weight: 600;
    cursor: pointer; max-width: 120px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap;
  }
  .profilechip:empty { display: none; }
  .profile-btn {
    display: block; width: 100%; text-align: center; background: var(--panel2);
    border: 1px solid #2a3040; color: var(--text); border-radius: var(--radius);
    padding: 16px; font-size: 17px; font-weight: 600; cursor: pointer;
    margin-bottom: 10px;
  }
  .profile-btn.active { border-color: var(--accent); color: var(--accent); }
  main { padding: 16px; max-width: 720px; margin: 0 auto; }

  /* tabs */
  nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    display: flex; background: var(--panel); border-top: 1px solid #262b36;
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav button {
    flex: 1; background: none; border: none; color: var(--muted);
    padding: 12px 0 10px; font-size: 13px; cursor: pointer;
  }
  nav button.active { color: var(--accent); font-weight: 600; }
  nav button .ico { display: block; font-size: 20px; margin-bottom: 2px; }

  /* search */
  .searchbar { display: flex; gap: 8px; margin-bottom: 16px; }
  .searchbar input {
    flex: 1; background: var(--panel); border: 1px solid #2a3040;
    border-radius: var(--radius); color: var(--text); padding: 12px 14px;
    font-size: 16px; outline: none;
  }
  .searchbar input:focus { border-color: var(--accent); }

  /* cards grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(104px, 1fr)); gap: 12px; }
  .card { cursor: pointer; position: relative; }
  .card img, .card .noposter {
    width: 100%; aspect-ratio: 2/3; object-fit: cover;
    border-radius: var(--radius); background: var(--panel2); display: block;
  }
  .card .noposter { display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 12px; text-align: center; padding: 8px; }
  .card .title { font-size: 12.5px; margin-top: 6px; color: var(--text);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card .sub { font-size: 11px; color: var(--muted); }
  .badge {
    position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,.75);
    color: var(--accent); font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 20px; text-transform: uppercase;
  }
  .badge.done { color: var(--green); }
  .badge.paused { color: var(--muted); }
  .card.paused img, .card.paused .noposter { filter: grayscale(1); opacity: .5; }
  .card.paused .title { color: var(--muted); }
  .progressbar { height: 4px; background: #2a3040; border-radius: 2px; margin-top: 5px; overflow: hidden; }
  .progressbar div { height: 100%; background: var(--green); border-radius: 2px; }

  .empty { text-align: center; color: var(--muted); padding: 48px 16px; }
  .empty .big { font-size: 40px; margin-bottom: 10px; }

  /* tonight picker */
  .tonight-card { max-width: 340px; margin: 8px auto 0; text-align: center; }
  .tonight-card img, .tonight-card .noposter {
    width: 62%; aspect-ratio: 2/3; object-fit: cover; border-radius: var(--radius);
    background: var(--panel2); margin: 0 auto 14px; display: block;
  }
  .tonight-card .noposter { display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 13px; padding: 8px; }
  .tonight-card h2 { font-size: 20px; margin-bottom: 6px; }
  .tonight-card .meta { color: var(--muted); font-size: 14px; margin-bottom: 12px; }
  .tonight-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
  .tonight-btns .btn { padding: 14px; font-size: 16px; }
  .bigpick { display: block; width: 100%; padding: 16px; font-size: 17px; margin-top: 18px; }

  /* folder chips */
  .chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px;
    margin-bottom: 12px; scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; background: var(--panel); border: 1px solid #2a3040;
    color: var(--muted); border-radius: 18px; padding: 7px 14px; font-size: 13px;
    font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #111; }
  .chip.new { border-style: dashed; }

  /* feed */
  .feed-item { display: flex; gap: 12px; align-items: center; padding: 12px 0;
    border-bottom: 1px solid #232838; cursor: pointer; }
  .feed-item img, .feed-item .noposter { width: 46px; aspect-ratio: 2/3;
    object-fit: cover; border-radius: 8px; background: var(--panel2); flex-shrink: 0; }
  .feed-item .what { flex: 1; font-size: 14.5px; }
  .feed-item .what b { color: var(--accent); font-weight: 600; }
  .feed-item .when { font-size: 12px; color: var(--muted); flex-shrink: 0; }

  /* new episodes banner */
  .newband {
    background: linear-gradient(90deg, #2a2410, #1f2430); border: 1px solid #4a3f18;
    border-radius: var(--radius); padding: 12px 14px; margin-bottom: 14px;
    font-size: 14px; cursor: pointer;
  }
  .newband b { color: var(--accent); }

  /* detail sheet */
  .sheet-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 20;
    display: none; align-items: flex-end; justify-content: center;
  }
  .sheet-backdrop.open { display: flex; }
  .sheet {
    background: var(--panel); width: 100%; max-width: 720px;
    max-height: 88vh; overflow-y: auto; border-radius: 18px 18px 0 0;
    padding: 20px 16px calc(24px + env(safe-area-inset-bottom));
  }
  .sheet .grabber { width: 40px; height: 4px; background: #3a4152; border-radius: 2px; margin: 0 auto 16px; }
  .sheet-close {
    position: sticky; top: 0; float: right; z-index: 5;
    background: var(--panel2); border: 1px solid #333b4d; color: var(--muted);
    width: 34px; height: 34px; border-radius: 50%; font-size: 15px;
    cursor: pointer; margin: -6px 0 0 8px;
  }
  .detail-head { display: flex; gap: 14px; }
  .detail-head img, .detail-head .noposter {
    width: 110px; aspect-ratio: 2/3; object-fit: cover; border-radius: var(--radius);
    background: var(--panel2); flex-shrink: 0;
  }
  .detail-head h2 { font-size: 19px; margin-bottom: 4px; }
  .detail-head .meta { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
  .btnrow { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .btn {
    border: none; border-radius: 10px; padding: 10px 16px; font-size: 14px;
    font-weight: 600; cursor: pointer; background: var(--panel2); color: var(--text);
  }
  .btn.primary { background: var(--accent); color: #111; }
  .btn.danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
  .btn.green { background: var(--green); color: #0b2018; }
  .btn:disabled { opacity: .5; cursor: default; }

  .overview { color: var(--muted); font-size: 14px; margin: 14px 0; }
  h3.section { font-size: 13px; text-transform: uppercase; letter-spacing: .06em;
    color: var(--muted); margin: 18px 0 10px; }

  /* library triage groups */
  .grp-head { display: flex; align-items: center; gap: 8px; cursor: pointer; margin: 18px 0 10px; }
  .grp-head .chev { color: var(--muted); font-size: 13px; transition: transform .15s; }
  .grp-head.open .chev { transform: rotate(90deg); }
  .grp-head .name { font-size: 13px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
  .grp-head .count { font-size: 12px; color: var(--muted); }

  /* providers */
  .providers { display: flex; gap: 10px; flex-wrap: wrap; }
  .provider { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 56px; }
  .provider img { width: 44px; height: 44px; border-radius: 10px; }
  .provider span { font-size: 10px; color: var(--muted); text-align: center;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis; width: 100%; }
  .prov-label { font-size: 11px; color: var(--muted); margin: 8px 0 6px; }
  .prov-note { font-size: 11px; color: var(--muted); margin-top: 10px; }
  .prov-note a { color: var(--accent); }

  /* seasons / episodes */
  .season {
    background: var(--panel2); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden;
  }
  .season-head {
    display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer;
  }
  .season-head .name { font-weight: 600; font-size: 14.5px; flex: 1; }
  .season-head .count { font-size: 12px; color: var(--muted); }
  .season-head .chev { color: var(--muted); transition: transform .15s; }
  .season.open .chev { transform: rotate(90deg); }
  .season-body { display: none; padding: 0 14px 12px; }
  .season.open .season-body { display: block; }
  .season-actions { display: flex; gap: 8px; margin-bottom: 10px; }
  .season-actions .btn { padding: 6px 12px; font-size: 12.5px; }
  .ep {
    display: flex; align-items: center; gap: 10px; padding: 9px 0;
    border-top: 1px solid #2a3040; cursor: pointer;
  }
  .ep .num { color: var(--muted); font-size: 12.5px; width: 34px; flex-shrink: 0; }
  .ep .name { flex: 1; font-size: 14px; }
  .ep.watched .name { color: var(--muted); text-decoration: line-through; }
  .check {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid #3a4152;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    font-size: 12px; color: transparent;
  }
  .ep.watched .check { background: var(--green); border-color: var(--green); color: #0b2018; }

  /* settings */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .field input, .field select {
    width: 100%; background: var(--bg); border: 1px solid #2a3040; border-radius: 10px;
    color: var(--text); padding: 11px 12px; font-size: 15px; outline: none;
  }
  .hint { font-size: 12.5px; color: var(--muted); margin-top: 6px; }
  .hint a { color: var(--accent); }

  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--panel2); color: var(--text); padding: 10px 18px;
    border-radius: 24px; font-size: 14px; z-index: 40; opacity: 0;
    transition: opacity .2s; pointer-events: none; border: 1px solid #333b4d;
    max-width: 90vw; text-align: center;
  }
  .toast.show { opacity: 1; }
  .spin { text-align: center; color: var(--muted); padding: 24px; }
</style>
</head>
<body>

<header>
  <h1>Watch<span>Pi</span></h1>
  <div class="spacer"></div>
  <button class="profilechip" id="profile-chip" onclick="openProfilePicker()" title="Switch profile"></button>
  <button class="iconbtn" onclick="openSettings()" title="Settings">⚙</button>
</header>

<main id="main"></main>

<nav>
  <button id="tab-library" class="active" onclick="showTab('library')"><span class="ico">🗂</span>Library</button>
  <button id="tab-tonight" onclick="showTab('tonight')"><span class="ico">🌙</span>Tonight</button>
  <button id="tab-feed" onclick="showTab('feed')"><span class="ico">👀</span>Feed</button>
  <button id="tab-search" onclick="showTab('search')"><span class="ico">🔍</span>Search</button>
</nav>

<div class="sheet-backdrop" id="sheet-backdrop" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================ config */
/* Config lives on the Pi (data/config.json) so every device shares the
   same TMDB key & region — enter it once, anywhere. */
const S = { key: '', region: 'US', rawgKey: '' };
async function loadConfig() {
  try {
    const cfg = await api('/config');
    S.key = cfg.tmdb_key || '';
    S.region = cfg.region || 'US';
    S.rawgKey = cfg.rawg_key || '';
  } catch { /* Pi unreachable — views show their own errors */ }
}

/* Current profile. The library is shared; watch progress is per profile. */
let USER = null;     // {id, name}
let USERS = [];
function userQ() { return USER ? `user=${USER.id}` : ''; }
async function loadUsers() {
  try { USERS = await api('/users'); } catch { USERS = []; }
  const savedId = parseInt(localStorage.getItem('watchpi_user') || '0', 10);
  USER = USERS.find(u => u.id === savedId) || null;
  updateProfileChip();
}
function updateProfileChip() {
  document.getElementById('profile-chip').textContent = USER ? USER.name : '';
}
const IMG = 'https://image.tmdb.org/t/p/';
/* TMDB posters are paths; RAWG (game) images are absolute URLs */
function posterUrl(p, size) { return p.startsWith('http') ? p : IMG + size + p; }
let tab = 'library';
let library = [];            // items from the Pi
let libIndex = {};           // `${media_type}:${tmdb_id}` -> item
let detailCache = {};        // tmdb detail responses (per session)
let seasonCache = {};        // `${tmdbId}:${season}` -> episodes
let FOLDERS = [];            // folders visible to the current user
let currentFolder = null;    // null = All
let currentType = 'all';     // 'all' | 'movie' | 'tv' | 'game'
let NEW_EPISODES = [];       // shows with episodes aired since last open
/* library triage groups: collapse state + cached caught-up verdicts, per device */
let libGroups = { done: false, stopped: false };   // false = collapsed
try { libGroups = { ...libGroups, ...JSON.parse(localStorage.getItem('watchpi_lib_groups') || '{}') }; } catch {}
let caughtUpCache = {};      // tmdbId -> {watched, caughtUp} — instant grouping on repeat opens
try { caughtUpCache = JSON.parse(localStorage.getItem('watchpi_caughtup') || '{}'); } catch {}

/* ============================================================ helpers */
function el(html) { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstChild; }
function esc(s) { return (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('show'), 2600);
}
function year(d) { return d ? d.slice(0, 4) : ''; }
function ago(iso) {
  const s = (Date.now() - new Date(iso).getTime()) / 1000;
  if (s < 90) return 'just now';
  if (s < 3600) return Math.round(s / 60) + 'm ago';
  if (s < 86400) return Math.round(s / 3600) + 'h ago';
  if (s < 86400 * 7) return Math.round(s / 86400) + 'd ago';
  return new Date(iso).toLocaleDateString();
}

/* TMDB — supports both a v3 api key and a v4 read access token */
async function tmdb(path, params = {}) {
  const url = new URL('https://api.themoviedb.org/3' + path);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const opts = { headers: {} };
  const key = S.key;
  if (!key) throw new Error('no-key');
  if (key.length > 60) opts.headers['Authorization'] = 'Bearer ' + key; // v4 token
  else url.searchParams.set('api_key', key);                            // v3 key
  const r = await fetch(url, opts);
  if (r.status === 401) throw new Error('bad-key');
  if (!r.ok) throw new Error('tmdb-' + r.status);
  return r.json();
}

/* RAWG — game metadata, same browser-side pattern as TMDB */
async function rawg(path, params = {}) {
  if (!S.rawgKey) throw new Error('no-rawg-key');
  const url = new URL('https://api.rawg.io/api' + path);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  url.searchParams.set('key', S.rawgKey);
  const r = await fetch(url);
  if (r.status === 401) throw new Error('bad-rawg-key');
  if (!r.ok) throw new Error('rawg-' + r.status);
  return r.json();
}

/* Pi API */
async function api(path, opts = {}) {
  const r = await fetch('/api' + path, {
    headers: { 'Content-Type': 'application/json' }, ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!r.ok && r.status !== 204) throw new Error('api-' + r.status);
  return r.status === 204 ? null : r.json();
}

async function loadLibrary() {
  library = USER ? await api(`/library?${userQ()}&include=episodes`) : [];
  libIndex = {};
  library.forEach(i => libIndex[`${i.media_type}:${i.tmdb_id}`] = i);
}

/* first unwatched episode across seasons, or null if caught up */
function computeNextUp(d, watchedSet) {
  const seasons = (d.seasons || []).filter(s => s.season_number > 0)
    .sort((a, b) => a.season_number - b.season_number);
  for (const s of seasons)
    for (let e = 1; e <= (s.episode_count || 0); e++)
      if (!watchedSet.has(`${s.season_number}:${e}`)) return { s: s.season_number, e };
  return null;
}
/* like computeNextUp but "caught up" once every AIRED episode is watched — the
   next-up must not point past the last episode that has actually aired. */
function nextUpAired(d, watchedSet) {
  const n = computeNextUp(d, watchedSet);
  if (!n) return null;
  const le = d.last_episode_to_air;
  if (!le || !le.season_number) return null;   // nothing aired yet
  if (n.s > le.season_number || (n.s === le.season_number && n.e > le.episode_number))
    return null;                               // caught up on everything aired
  return n;
}
function watchedSetOf(item) {
  return new Set((item.episodes || []).map(([s, e]) => `${s}:${e}`));
}
async function loadFolders() {
  FOLDERS = USER ? await api(`/folders?${userQ()}`) : [];
}

/* ============================================================ tabs */
function showTab(t) {
  tab = t;
  for (const n of ['library', 'tonight', 'feed', 'search'])
    document.getElementById('tab-' + n).classList.toggle('active', t === n);
  if (t === 'library') renderLibrary();
  else if (t === 'tonight') renderTonight();
  else if (t === 'feed') renderFeed();
  else renderSearch();
}

/* ============================================================ library view */
async function renderLibrary() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="spin">Loading…</div>';
  try { await Promise.all([loadLibrary(), loadFolders()]); }
  catch { main.innerHTML = '<div class="empty">Can’t reach the Pi API.</div>'; return; }

  main.innerHTML = '';

  /* new-episodes banner */
  if (NEW_EPISODES.length) {
    const band = el(`<div class="newband">🔔 <b>New episodes</b> since you last opened:
      ${esc(NEW_EPISODES.map(n => n.text).join(' · '))} <span style="color:var(--muted)">(tap to dismiss)</span></div>`);
    band.onclick = () => { NEW_EPISODES = []; band.remove(); };
    main.appendChild(band);
  }

  /* folder chips */
  if (currentFolder && !FOLDERS.find(f => f.id === currentFolder)) currentFolder = null;
  const chips = el('<div class="chips"></div>');
  const allChip = el(`<button class="chip ${currentFolder === null ? 'active' : ''}">All</button>`);
  allChip.onclick = () => { currentFolder = null; renderLibrary(); };
  chips.appendChild(allChip);
  for (const f of FOLDERS) {
    const c = el(`<button class="chip ${currentFolder === f.id ? 'active' : ''}">${f.shared ? '👥 ' : ''}${esc(f.name)}</button>`);
    c.onclick = () => { currentFolder = f.id; renderLibrary(); };
    chips.appendChild(c);
  }
  const newChip = el('<button class="chip new">＋ Folders</button>');
  newChip.onclick = openFolderManager;
  chips.appendChild(newChip);
  main.appendChild(chips);

  /* type filter chips */
  const typeChips = el('<div class="chips"></div>');
  for (const [type, label] of [['all', 'All'], ['movie', 'Movies'], ['tv', 'Series'], ['game', 'Games']]) {
    const c = el(`<button class="chip ${currentType === type ? 'active' : ''}">${label}</button>`);
    c.onclick = () => { currentType = type; renderLibrary(); };
    typeChips.appendChild(c);
  }
  main.appendChild(typeChips);

  let visible = currentFolder === null
    ? library
    : library.filter(i => (i.folders || []).includes(currentFolder));
  if (currentType !== 'all') visible = visible.filter(i => i.media_type === currentType);

  /* latest activity first (never-watched fall back to added date) */
  visible = [...visible].sort((a, b) =>
    (b.last_watched_at || b.added_at || '').localeCompare(a.last_watched_at || a.added_at || ''));

  if (!visible.length) {
    main.appendChild(el(`<div class="empty"><div class="big">🎬</div>
      ${currentFolder === null && currentType === 'all'
        ? 'Your library is empty.<br>Search for a show or movie to add it.'
        : 'Nothing here.<br>Try a different filter, or open a title and add it from there.'}</div>`));
    return;
  }

  /* the group area is redrawn on its own so revalidation can repaint it */
  const groupArea = el('<div></div>');
  main.appendChild(groupArea);

  /* verdicts we can decide right now: movies/games from Pi data, TV from the
     device cache; unknown TV is provisionally "up next" (never hidden). */
  const syncVerdicts = () => {
    const v = new Map();
    for (const i of visible) {
      if (i.media_type !== 'tv') continue;
      const c = caughtUpCache[i.tmdb_id];
      if (c && c.watched === i.watched_episodes) v.set(i.id, c.caughtUp ? null : true);
    }
    return v;
  };

  const tvVisible = visible.filter(i => i.media_type === 'tv' && !i.stopped);
  const anyCached = tvVisible.some(i => {
    const c = caughtUpCache[i.tmdb_id];
    return c && c.watched === i.watched_episodes;
  });

  if (tvVisible.length && !anyCached) {
    /* truly cold (first-ever open on this device): resolve before first paint
       so caught-up shows don't visibly jump groups. one-time only. */
    groupArea.innerHTML = '<div class="spin">Organizing…</div>';
    const verdicts = await resolveNextUp(visible);
    paintGroups(groupArea, visible, verdicts);
    return;
  }

  /* instant paint from cache, then quietly revalidate against TMDB */
  const cached = syncVerdicts();
  paintGroups(groupArea, visible, cached);
  const sigBefore = groupSig(visible, cached);
  const fresh = await resolveNextUp(visible);
  if (tab === 'library' && groupSig(visible, fresh) !== sigBefore)
    paintGroups(groupArea, visible, fresh);
}

/* build one library card (poster, badges, sub-label, click, async enrich) */
function libraryCard(item) {
  const card = el(`<div class="card ${item.stopped ? 'paused' : ''}">
    ${item.poster_path
      ? `<img loading="lazy" src="${posterUrl(item.poster_path, 'w185')}" alt="">`
      : `<div class="noposter">${esc(item.title)}</div>`}
    <div class="title">${esc(item.title)}</div>
    <div class="progressbar" style="display:none"><div></div></div>
    <div class="sub"></div>
  </div>`);
  const sub = card.querySelector('.sub');
  if (item.media_type === 'movie') {
    if (item.watched) card.prepend(el('<span class="badge done">✓ seen</span>'));
    sub.textContent = 'Movie';
  } else if (item.media_type === 'game') {
    if (item.watched) card.prepend(el('<span class="badge done">✓ finished</span>'));
    else if (item.stopped) card.prepend(el('<span class="badge paused">⏸ shelved</span>'));
    else card.prepend(el('<span class="badge">Game</span>'));
    sub.textContent = item.stopped ? 'Stopped playing' : 'Game';
  } else if (item.stopped) {
    card.prepend(el('<span class="badge paused">⏸ paused</span>'));
    sub.textContent = 'Stopped watching';
  } else {
    sub.textContent = item.watched_episodes ? `${item.watched_episodes} ep watched` : 'TV show';
    card.prepend(el('<span class="badge">TV</span>'));
    enrichCard(item, card);   // async: next-up + progress once TMDB answers
  }
  card.onclick = () => openDetail(item.media_type, item.tmdb_id, item.title);
  return card;
}
function fillGrid(grid, items) { for (const i of items) grid.appendChild(libraryCard(i)); }

/* which group a title belongs to, given a caught-up verdict for TV shows
   (null = caught up on aired). movies/games use their Pi flags. */
function groupOf(item, verdicts) {
  if (item.stopped) return 'stopped';
  if (item.media_type === 'movie' || item.media_type === 'game')
    return item.watched ? 'done' : 'upnext';
  return verdicts.get(item.id) === null ? 'done' : 'upnext';   // tv
}
function partition(visible, verdicts) {
  const g = { upnext: [], done: [], stopped: [] };
  for (const i of visible) g[groupOf(i, verdicts)].push(i);
  return g;
}
function groupSig(visible, verdicts) {
  return visible.map(i => `${i.id}:${groupOf(i, verdicts)}`).join(',');
}

function paintGroups(container, visible, verdicts) {
  const g = partition(visible, verdicts);
  const hasTail = g.done.length || g.stopped.length;
  container.innerHTML = '';

  if (g.upnext.length) {
    if (hasTail) container.appendChild(el('<h3 class="section" style="margin-top:6px">▶ Up next</h3>'));
    const grid = el('<div class="grid"></div>');
    fillGrid(grid, g.upnext);
    container.appendChild(grid);
  } else if (hasTail) {
    container.appendChild(el('<div class="empty" style="padding:24px 16px">You’re all caught up ✓</div>'));
  }

  for (const [key, label, list] of [['done', '✓ Watched it all', g.done], ['stopped', '⏸ Stopped', g.stopped]]) {
    if (!list.length) continue;
    const open = libGroups[key];
    const head = el(`<div class="grp-head ${open ? 'open' : ''}">
      <span class="chev">›</span><span class="name">${label}</span><span class="count">${list.length}</span></div>`);
    const grid = el(`<div class="grid" ${open ? '' : 'style="display:none"'}></div>`);
    fillGrid(grid, list);
    head.onclick = () => {
      libGroups[key] = !libGroups[key];
      localStorage.setItem('watchpi_lib_groups', JSON.stringify(libGroups));
      head.classList.toggle('open', libGroups[key]);
      grid.style.display = libGroups[key] ? '' : 'none';
    };
    container.appendChild(head);
    container.appendChild(grid);
  }
}

/* resolve caught-up status for TV shows via TMDB, updating the device cache */
async function resolveNextUp(visible) {
  const map = new Map();
  await Promise.all(visible.filter(i => i.media_type === 'tv' && !i.stopped).map(async item => {
    try {
      const ck = `tv:${item.tmdb_id}`;
      const d = detailCache[ck] || await tmdb(`/tv/${item.tmdb_id}`, { append_to_response: 'watch/providers' });
      detailCache[ck] = d;
      const next = nextUpAired(d, watchedSetOf(item));
      map.set(item.id, next);
      caughtUpCache[item.tmdb_id] = { watched: item.watched_episodes, caughtUp: next === null };
    } catch { /* offline / no key — leave unset, treated as up next */ }
  }));
  try { localStorage.setItem('watchpi_caughtup', JSON.stringify(caughtUpCache)); } catch {}
  return map;
}

/* upgrade a TV card with "Next: SxEy" + progress toward the show total */
async function enrichCard(item, card) {
  try {
    const ck = `tv:${item.tmdb_id}`;
    const d = detailCache[ck] || await tmdb(`/tv/${item.tmdb_id}`, { append_to_response: 'watch/providers' });
    detailCache[ck] = d;
    const next = nextUpAired(d, watchedSetOf(item));
    const total = d.number_of_episodes || 0;
    const sub = card.querySelector('.sub');
    let txt = next ? `Next: S${next.s}E${next.e}` : 'Caught up ✓';
    if (total) txt += ` · ${item.watched_episodes}/${total}`;
    sub.textContent = txt;
    if (!next) sub.style.color = 'var(--green)';
    if (total && item.watched_episodes) {
      const bar = card.querySelector('.progressbar');
      bar.style.display = 'block';
      bar.firstElementChild.style.width =
        Math.min(100, Math.round(100 * item.watched_episodes / total)) + '%';
    }
  } catch { /* no key / offline — card keeps its basic label */ }
}

try { tonightPrefs = { ...tonightPrefs, ...JSON.parse(localStorage.getItem('watchpi_tonight') || '{}') }; } catch {}

let tonightIdx = 0;

async function computeTonightPicks(time, folderId) {
  const pool = library.filter(i =>
    i.media_type !== 'game' && !i.stopped &&
    !(i.media_type === 'movie' && i.watched) &&
    (folderId === null || (i.folders || []).includes(folderId)));

  const picks = [];
  await Promise.all(pool.map(async item => {
    try {
      const ck = `${item.media_type}:${item.tmdb_id}`;
      const d = detailCache[ck] || await tmdb(`/${item.media_type}/${item.tmdb_id}`, { append_to_response: 'watch/providers' });
      detailCache[ck] = d;
      let runtime, info;
      if (item.media_type === 'tv') {
        const next = computeNextUp(d, watchedSetOf(item));
        if (!next) return;   // caught up — nothing to watch tonight
        runtime = (d.episode_run_time && d.episode_run_time[0])
          || (d.last_episode_to_air && d.last_episode_to_air.runtime) || 40;
        info = `Next up S${next.s}E${next.e} · ~${runtime} min`;
      } else {
        runtime = d.runtime || 105;
        info = `Movie · ${Math.floor(runtime / 60)}h ${String(runtime % 60).padStart(2, '0')}m`;
      }
      if (time === '30' && (item.media_type !== 'tv' || runtime > 35)) return;
      if (time === '60' && runtime > 70) return;
      if (time === 'movie' && item.media_type !== 'movie') return;

      /* score: mid-binge recency beats everything, fresh episodes next, movies last */
      let score = 0;
      if (item.media_type === 'tv' && item.watched_episodes > 0 && item.last_watched_at) {
        const days = (Date.now() - new Date(item.last_watched_at).getTime()) / 86400e3;
        score = 1000 - Math.min(days, 900);   // the fresher the binge, the higher
      }
      const le = d.last_episode_to_air;
      if (item.media_type === 'tv' && le && le.air_date &&
          (Date.now() - new Date(le.air_date).getTime()) / 86400e3 < 14) score += 80;
      if (item.media_type === 'movie')
        score = 50 + new Date(item.added_at).getTime() / 1e13;   // after active binges, newest first
      picks.push({ item, d, info, score });
    } catch { /* offline / failed lookup — skip this candidate */ }
  }));
  picks.sort((a, b) => b.score - a.score);
  return picks;
}

function renderTonightCard() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  if (!tonightPicks.length) {
    main.appendChild(el(`<div class="empty"><div class="big">🌙</div>
      Nothing in your library fits.<br>Loosen the filters — or add something from Search.</div>`));
    const back = el('<button class="btn" style="display:block;margin:0 auto">‹ Change filters</button>');
    back.onclick = renderTonight;
    main.appendChild(back);
    return;
  }
  const { item, d, info } = tonightPicks[Math.min(tonightIdx, tonightPicks.length - 1)];
  const card = el(`<div class="tonight-card">
    ${item.poster_path
      ? `<img src="${posterUrl(item.poster_path, 'w342')}" alt="">`
      : `<div class="noposter">${esc(item.title)}</div>`}
    <h2>${esc(item.title)}</h2>
    <div class="meta">${esc(info)}</div>
    <div class="providers" style="justify-content:center" id="t-prov"></div>
    <div class="tonight-btns">
      <button class="btn primary" id="t-go">▶ This one</button>
      <button class="btn" id="t-re"></button>
      <button class="btn" id="t-back" style="background:none;color:var(--muted)">‹ Change filters</button>
    </div>
  </div>`);
  const provs = ((d['watch/providers'] || {}).results || {})[S.region];
  if (provs && provs.flatrate) {
    const box = card.querySelector('#t-prov');
    for (const pr of provs.flatrate.slice(0, 4))
      box.appendChild(el(`<div class="provider">
        <img loading="lazy" src="${IMG}w92${pr.logo_path}" alt="">
        <span>${esc(pr.provider_name)}</span></div>`));
  }
  card.querySelector('#t-go').onclick = () => openDetail(item.media_type, item.tmdb_id, item.title);
  const re = card.querySelector('#t-re');
  const rerollsLeft = TONIGHT.maxRerolls - tonightIdx;
  if (rerollsLeft > 0 && tonightIdx < tonightPicks.length - 1) {
    re.textContent = `🎲 Something else (${rerollsLeft})`;
    re.onclick = () => { tonightIdx++; renderTonightCard(); };
  } else {
    re.textContent = "That's the one — enjoy 🍿";
    re.disabled = true;
  }
  card.querySelector('#t-back').onclick = renderTonight;
  main.appendChild(card);
}

/* ============================================================ suggestions
   The "engine" is TMDB's own per-title recommendations endpoint (the data
   behind every "More like this" row), seeded with the titles across your
   folders — no self-hosted recommender needed. Tune it via SUGGEST below.
   Results are cached on the Pi per profile so every device shares them, and
   rebuilt on Fridays — only when the seed titles changed since last build. */
const SUGGEST = { maxSeeds: 12, perSeed: 12, maxResults: 24, gameSeeds: 6, gameResults: 12 };
let SUGGESTIONS = null;   // {built_at, seed_hash, items} — session copy of the Pi cache

function suggestionSeeds() {
  const pick = (types, cap) => {
    const pool = library.filter(i => types.includes(i.media_type));
    const inFolders = pool.filter(i => (i.folders || []).length);
    const seeds = (inFolders.length ? inFolders : pool).slice();
    seeds.sort((a, b) => (b.last_watched_at || b.added_at || '')
      .localeCompare(a.last_watched_at || a.added_at || ''));
    return seeds.slice(0, cap);
  };
  return {
    shows: pick(['movie', 'tv'], SUGGEST.maxSeeds),            // TMDB engine
    games: S.rawgKey ? pick(['game'], SUGGEST.gameSeeds) : [], // RAWG engine
  };
}
function seedHashOf(seeds) {
  const all = [...seeds.shows, ...seeds.games];
  const s = all.map(x => `${x.media_type}:${x.tmdb_id}`).sort().join(',');
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) >>> 0;
  return h.toString(16) + ':' + all.length;
}
function lastFriday() {
  const d = new Date(); d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() - ((d.getDay() - 5 + 7) % 7));
  return d;
}

async function buildSuggestions(seeds, hash) {
  const cand = {};   // "type:id" -> {r, mt, n: seed hits, rank}
  const consider = (r, mt, hits, rankPts) => {
    const key = `${mt}:${r.id}`;
    if (libIndex[key]) return;   // already in the library
    const e = cand[key] || (cand[key] = { r, mt, n: 0, rank: 0 });
    e.n += hits; e.rank += rankPts;
  };

  /* movies & tv: TMDB per-title recommendations */
  await Promise.all(seeds.shows.map(async s => {
    try {
      const d = await tmdb(`/${s.media_type}/${s.tmdb_id}/recommendations`);
      (d.results || []).slice(0, SUGGEST.perSeed).forEach((r, idx) => {
        const mt = r.media_type || s.media_type;
        if (mt === 'movie' || mt === 'tv') consider(r, mt, 1, SUGGEST.perSeed - idx);
      });
    } catch { /* one failed seed shouldn't kill the build */ }
  }));

  /* games: RAWG free tier — same-series entries (strong signal, extra hit
     weight) plus one discovery query over the seed games' top genres */
  const genreCount = {};
  await Promise.all(seeds.games.map(async s => {
    const [detail, series] = await Promise.allSettled([
      rawg(`/games/${s.tmdb_id}`),
      rawg(`/games/${s.tmdb_id}/game-series`, { page_size: 6 }),
    ]);
    if (detail.status === 'fulfilled')
      for (const g of detail.value.genres || [])
        genreCount[g.slug] = (genreCount[g.slug] || 0) + 1;
    if (series.status === 'fulfilled')
      (series.value.results || []).forEach((r, idx) => consider(r, 'game', 2, 6 - idx));
  }));
  const topGenres = Object.entries(genreCount).sort((a, b) => b[1] - a[1])
    .slice(0, 3).map(([slug]) => slug);
  if (topGenres.length) {
    try {
      const d = await rawg('/games', { genres: topGenres.join(','), ordering: '-metacritic', page_size: 24 });
      (d.results || []).forEach((r, idx) => consider(r, 'game', 1, 24 - idx));
    } catch { /* keep whatever candidates we have */ }
  }

  const ranked = Object.values(cand)
    .sort((a, b) => (b.n - a.n) || (b.rank - a.rank)
      || ((b.r.vote_average || b.r.rating || 0) - (a.r.vote_average || a.r.rating || 0)));
  const items = [
    ...ranked.filter(e => e.mt !== 'game').slice(0, SUGGEST.maxResults),
    ...ranked.filter(e => e.mt === 'game').slice(0, SUGGEST.gameResults),
  ].map(e => ({ tmdb_id: e.r.id, media_type: e.mt, title: e.r.title || e.r.name,
                poster_path: e.r.poster_path || e.r.background_image || null,
                date: e.r.release_date || e.r.first_air_date || e.r.released || '' }));
  await api(`/suggestions?${userQ()}`, { method: 'PUT', body: { seed_hash: hash, items } });
  return { built_at: new Date().toISOString(), seed_hash: hash, items };
}

/* rebuild when there's no cache yet, or on/after Friday IF the seeds changed */
async function refreshSuggestions(force = false) {
  if (!USER || !S.key) return null;
  try { if (!library.length) await loadLibrary(); } catch { return null; }
  const seeds = suggestionSeeds();
  if (!seeds.shows.length && !seeds.games.length) return null;
  const hash = seedHashOf(seeds);
  let cache = SUGGESTIONS;
  if (!cache) { try { cache = await api(`/suggestions?${userQ()}`); } catch { return null; } }
  const stale = !cache.items.length
    || (cache.seed_hash !== hash && new Date(cache.built_at) < lastFriday());
  if (force || stale) {
    try { cache = await buildSuggestions(seeds, hash); } catch { /* keep the old batch */ }
  }
  SUGGESTIONS = cache;
  return cache;
}

async function renderSuggestions() {
  const box = document.getElementById('results');
  if (!box) return;
  box.innerHTML = '<div class="spin">Finding suggestions…</div>';
  const sug = await refreshSuggestions();
  const q = document.getElementById('q');
  if (!q || q.value.trim()) return;   // user started a search meanwhile
  let fresh = (sug ? sug.items : []).filter(r => !libIndex[`${r.media_type}:${r.tmdb_id}`]);
  if (searchType !== 'all') fresh = fresh.filter(r => r.media_type === searchType);
  if (!fresh.length) {
    box.innerHTML = `<div class="empty">Type to search.<br>
      <span style="font-size:12px">Suggestions appear here once your folders have a few titles${searchType === 'game' ? ' (games need a RAWG key in ⚙ settings)' : ''}.</span></div>`;
    return;
  }
  box.innerHTML = '';
  const head = el(`<div style="display:flex;align-items:center;gap:8px">
    <h3 class="section" style="margin:14px 0 4px;flex:1">✨ Suggested for you</h3>
    <button class="btn" id="sug-refresh" style="padding:5px 10px;font-size:12px">Refresh</button></div>`);
  head.querySelector('#sug-refresh').onclick = async () => {
    box.innerHTML = '<div class="spin">Refreshing…</div>';
    await refreshSuggestions(true);
    renderSuggestions();
  };
  box.appendChild(head);
  box.appendChild(el('<p class="hint" style="margin-bottom:12px">Based on the titles across your folders · refreshes on Fridays when your library changed.</p>'));
  const addGrid = list => {
    const grid = el('<div class="grid"></div>');
    for (const r of list) {
      const card = el(`<div class="card">
        ${r.poster_path
          ? `<img loading="lazy" src="${posterUrl(r.poster_path, 'w185')}" alt="">`
          : `<div class="noposter">${esc(r.title)}</div>`}
        <span class="badge">${r.media_type}</span>
        <div class="title">${esc(r.title)}</div>
        <div class="sub">${year(r.date)}</div>
      </div>`);
      card.onclick = () => openDetail(r.media_type, r.tmdb_id, r.title);
      grid.appendChild(card);
    }
    box.appendChild(grid);
  };
  const shows = fresh.filter(r => r.media_type !== 'game');
  const games = fresh.filter(r => r.media_type === 'game');
  if (shows.length && games.length) {
    box.appendChild(el('<h3 class="section">Movies &amp; TV</h3>'));
    addGrid(shows);
    box.appendChild(el('<h3 class="section">Games</h3>'));
    addGrid(games);
  } else {
    addGrid(fresh);
  }
}

/* ============================================================ search view */
let searchType = 'all';   // 'all' | 'movie' | 'tv' | 'game' — Search tab filter

function renderSearch() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="searchbar">
      <input id="q" type="search" placeholder="Search movies, TV & games…" autocomplete="off">
    </div>
    <div class="chips" id="search-type-chips"></div>
    <div id="results"></div>`;
  const chipsRow = document.getElementById('search-type-chips');
  for (const [type, label] of [['all', 'All'], ['movie', 'Movies'], ['tv', 'Series'], ['game', 'Games']]) {
    const c = el(`<button class="chip ${searchType === type ? 'active' : ''}">${label}</button>`);
    c.onclick = () => {
      searchType = type;
      [...chipsRow.children].forEach(b => b.classList.toggle('active', b === c));
      const qv = document.getElementById('q').value;
      if (qv.trim()) doSearch(qv); else renderSuggestions();
    };
    chipsRow.appendChild(c);
  }
  const q = document.getElementById('q');
  let timer;
  q.addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(() => doSearch(q.value), 350); });
  q.focus();
  if (S.key || S.rawgKey) renderSuggestions();
  else document.getElementById('results').innerHTML =
    '<div class="empty">Add your TMDB API key in ⚙ settings first.</div>';
}

function searchCard(mediaType, id, title, poster, date) {
  const inLib = libIndex[`${mediaType}:${id}`];
  const card = el(`<div class="card">
    ${poster
      ? `<img loading="lazy" src="${posterUrl(poster, 'w185')}" alt="">`
      : `<div class="noposter">${esc(title)}</div>`}
    ${inLib ? '<span class="badge done">✓ added</span>' : `<span class="badge">${mediaType}</span>`}
    <div class="title">${esc(title)}</div>
    <div class="sub">${year(date)}</div>
  </div>`);
  card.onclick = () => openDetail(mediaType, id, title);
  return card;
}

async function doSearch(query) {
  const box = document.getElementById('results');
  if (!query.trim()) { renderSuggestions(); return; }
  box.innerHTML = '<div class="spin">Searching…</div>';

  /* movies & TV from TMDB, games from RAWG — honoring the type filter */
  const wantShows = searchType !== 'game';
  const wantGames = (searchType === 'all' || searchType === 'game') && S.rawgKey;
  const [tmdbRes, rawgRes] = await Promise.allSettled([
    wantShows ? tmdb('/search/multi', { query, include_adult: 'false' }) : Promise.reject(new Error('skipped')),
    wantGames ? rawg('/games', { search: query, page_size: 12 }) : Promise.reject(new Error('skipped')),
  ]);
  if (tmdbRes.status === 'rejected' && rawgRes.status === 'rejected') {
    if (searchType === 'game')
      { box.innerHTML = '<div class="empty">Add a RAWG API key in ⚙ settings to search games.</div>'; return; }
    return handleTmdbError(tmdbRes.reason, box);
  }

  let shows = tmdbRes.status === 'fulfilled'
    ? (tmdbRes.value.results || []).filter(r => r.media_type === 'movie' || r.media_type === 'tv')
    : [];
  if (searchType === 'movie' || searchType === 'tv')
    shows = shows.filter(r => r.media_type === searchType);
  const games = rawgRes.status === 'fulfilled' ? (rawgRes.value.results || []) : [];
  if (!shows.length && !games.length) { box.innerHTML = '<div class="empty">No results.</div>'; return; }

  box.innerHTML = '';
  if (shows.length) {
    if (games.length) box.appendChild(el('<h3 class="section" style="margin-top:0">Movies &amp; TV</h3>'));
    const grid = el('<div class="grid"></div>');
    for (const r of shows)
      grid.appendChild(searchCard(r.media_type, r.id, r.title || r.name, r.poster_path,
        r.release_date || r.first_air_date));
    box.appendChild(grid);
  }
  if (games.length) {
    box.appendChild(el(`<h3 class="section" ${shows.length ? '' : 'style="margin-top:0"'}>Games</h3>`));
    const grid = el('<div class="grid"></div>');
    for (const g of games)
      grid.appendChild(searchCard('game', g.id, g.name, g.background_image, g.released));
    box.appendChild(grid);
  }
}

function handleTmdbError(e, box) {
  if (e.message === 'no-key') {
    if (box) box.innerHTML = '<div class="empty">Add your TMDB API key in ⚙ settings first.</div>';
    openSettings();
  } else if (e.message === 'bad-key') {
    if (box) box.innerHTML = '<div class="empty">TMDB rejected the API key — check ⚙ settings.</div>';
  } else {
    if (box) box.innerHTML = '<div class="empty">TMDB request failed. Are you online?</div>';
  }
}

/* ============================================================ detail sheet */
function closeSheet() { document.getElementById('sheet-backdrop').classList.remove('open'); }
function closeBtn() {
  const b = el('<button class="sheet-close" title="Close">✕</button>');
  b.onclick = closeSheet;
  return b;
}

async function openDetail(mediaType, tmdbId, fallbackTitle) {
  const bd = document.getElementById('sheet-backdrop');
  const sheet = document.getElementById('sheet');
  bd.classList.add('open');
  sheet.innerHTML = '<div class="grabber"></div>';
  sheet.appendChild(closeBtn());
  sheet.appendChild(el('<div class="spin">Loading…</div>'));

  let d;
  const ck = `${mediaType}:${tmdbId}`;
  try {
    d = detailCache[ck] || (mediaType === 'game'
      ? await rawg(`/games/${tmdbId}`)
      : await tmdb(`/${mediaType}/${tmdbId}`, { append_to_response: 'watch/providers' }));
    detailCache[ck] = d;
  } catch (e) {
    sheet.innerHTML = '<div class="grabber"></div>';
    sheet.appendChild(closeBtn());
    const box = el('<div></div>'); sheet.appendChild(box);
    return handleTmdbError(e, box);
  }
  try { await Promise.all([loadLibrary(), loadFolders()]); } catch {}
  renderDetail(sheet, mediaType, d, fallbackTitle);
}

function renderDetail(sheet, mediaType, d, fallbackTitle) {
  const title = d.title || d.name || fallbackTitle;
  const item = libIndex[`${mediaType}:${d.id}`];
  const date = d.release_date || d.first_air_date || d.released;
  const poster = d.poster_path || d.background_image;
  const meta = (mediaType === 'game'
    ? [year(date), d.playtime ? `~${d.playtime}h` : '', d.metacritic ? 'Metacritic ' + d.metacritic : '']
    : [
        year(date),
        mediaType === 'tv' ? `${d.number_of_seasons} season${d.number_of_seasons === 1 ? '' : 's'}` : (d.runtime ? d.runtime + ' min' : ''),
        (d.vote_average ? '★ ' + d.vote_average.toFixed(1) : ''),
      ]).filter(Boolean).join(' · ');

  sheet.innerHTML = '<div class="grabber"></div>';
  sheet.appendChild(closeBtn());
  /* next-up line for tv shows in the library */
  let nextupHtml = '';
  if (mediaType === 'tv' && item && !item.stopped) {
    const next = computeNextUp(d, watchedSetOf(item));
    nextupHtml = next
      ? `<div class="meta" style="color:var(--accent);font-weight:600">▶ Next up: S${next.s}E${next.e}</div>`
      : `<div class="meta" style="color:var(--green);font-weight:600">✓ Caught up</div>`;
  }
  sheet.appendChild(el(`<div class="detail-head">
    ${poster ? `<img src="${posterUrl(poster, 'w342')}" alt="">` : '<div class="noposter"></div>'}
    <div>
      <h2>${esc(title)}</h2>
      <div class="meta">${esc(meta)}</div>
      ${nextupHtml}
      <div class="btnrow" id="d-actions"></div>
    </div>
  </div>`));

  /* action buttons */
  const actions = sheet.querySelector('#d-actions');
  if (!item) {
    const add = el('<button class="btn primary">+ Add to library</button>');
    add.onclick = async () => {
      add.disabled = true;
      try {
        await api('/library', { method: 'POST', body: {
          tmdb_id: d.id, media_type: mediaType, title, poster_path: poster } });
        await loadLibrary();
        toast('Added to library');
        renderDetail(sheet, mediaType, d, fallbackTitle);
        if (tab === 'library') renderLibrary();
      } catch { add.disabled = false; toast('Failed — is the Pi up?'); }
    };
    actions.appendChild(add);
  } else {
    if (mediaType === 'movie' || mediaType === 'game') {
      const doneLbl = mediaType === 'game' ? ['✓ Finished', 'Mark finished'] : ['✓ Watched', 'Mark watched'];
      const w = el(`<button class="btn ${item.watched ? 'green' : ''}">${item.watched ? doneLbl[0] : doneLbl[1]}</button>`);
      w.onclick = async () => {
        await api(`/library/${item.id}?${userQ()}`, { method: 'PATCH', body: { watched: !item.watched } });
        await loadLibrary();
        renderDetail(sheet, mediaType, d, fallbackTitle);
        if (tab === 'library') renderLibrary();
      };
      actions.appendChild(w);
    }
    if (mediaType === 'game') {
      const stopBtn = el(`<button class="btn">${item.stopped ? '▶ Keep playing' : '⏸ Stop playing'}</button>`);
      stopBtn.onclick = async () => {
        stopBtn.disabled = true;
        try {
          await api(`/library/${item.id}?${userQ()}`, { method: 'PATCH',
            body: { stopped: !item.stopped } });
          await loadLibrary();
          toast(item.stopped ? 'Back on the backlog' : 'Shelved');
          renderDetail(sheet, mediaType, d, fallbackTitle);
          if (tab === 'library') renderLibrary();
        } catch { stopBtn.disabled = false; toast('Failed — is the Pi up?'); }
      };
      actions.appendChild(stopBtn);
    }
    if (mediaType === 'tv') {
      const stopBtn = el(`<button class="btn">${item.stopped ? '▶ Continue watching' : '⏸ Stop watching'}</button>`);
      stopBtn.onclick = async () => {
        const inShared = (item.folders || []).some(id => (FOLDERS.find(f => f.id === id) || {}).shared);
        if (!item.stopped && inShared &&
            !confirm(`“${title}” is in a shared folder 👥.\n\nStopping only pauses YOUR alerts and greys it in YOUR library — progress will keep syncing while it stays in the folder.\n\nStop watching?`))
          return;
        stopBtn.disabled = true;
        try {
          await api(`/library/${item.id}?${userQ()}`, { method: 'PATCH',
            body: { stopped: !item.stopped } });
          await loadLibrary();
          toast(item.stopped ? 'Back on the watchlist' : 'Paused — no more alerts for this one');
          renderDetail(sheet, mediaType, d, fallbackTitle);
          if (tab === 'library') renderLibrary();
        } catch { stopBtn.disabled = false; toast('Failed — is the Pi up?'); }
      };
      actions.appendChild(stopBtn);
    }
    const rm = el('<button class="btn danger">Remove</button>');
    rm.onclick = async () => {
      if (!confirm(`Remove “${title}” and its watch history?`)) return;
      await api(`/library/${item.id}`, { method: 'DELETE' });
      await loadLibrary();
      toast('Removed');
      closeSheet();
      if (tab === 'library') renderLibrary();
    };
    actions.appendChild(rm);
  }

  /* folders (library items only) */
  if (item) {
    sheet.appendChild(el('<h3 class="section">Folders</h3>'));
    const frow = el('<div class="chips" style="flex-wrap:wrap;overflow:visible"></div>');
    for (const f of FOLDERS) {
      const inF = () => (item.folders || []).includes(f.id);
      const c = el(`<button class="chip ${inF() ? 'active' : ''}">${f.shared ? '👥 ' : ''}${esc(f.name)}</button>`);
      c.onclick = async () => {
        const target = !inF();
        if (!target && f.shared &&
            !confirm(`Remove from shared folder “${f.name}”?\n\nProgress stops syncing — everyone keeps where they got to.`))
          return;
        if (target && f.shared &&
            !confirm(`Add to shared folder “${f.name}” 👥?\n\nEveryone in it gets YOUR current progress on this title, and it stays synced from here on.`))
          return;
        try {
          await api(`/folders/${f.id}/items?${userQ()}`, { method: 'PUT',
            body: { item_id: item.id, member: target } });
          item.folders = target
            ? [...(item.folders || []), f.id]
            : (item.folders || []).filter(id => id !== f.id);
          c.classList.toggle('active', target);
          if (target && f.shared) toast('In a shared folder — progress now syncs 👥');
        } catch { toast('Failed to update folder'); }
      };
      frow.appendChild(c);
    }
    const newChip = el('<button class="chip new">＋ New folder</button>');
    newChip.onclick = () => {
      const form = sheet.querySelector('#new-folder-inline');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    };
    frow.appendChild(newChip);
    sheet.appendChild(frow);

    const newForm = el(`
      <div class="field" id="new-folder-inline" style="display:none">
        <label>New folder</label>
        <input id="nf2-name" type="text" maxlength="40" placeholder="e.g. Watching together">
        ${memberPickerHtml('nf2')}
        <div class="btnrow"><button class="btn primary" id="nf2-create">Create &amp; add</button></div>
      </div>`);
    newForm.querySelector('#nf2-create').onclick = async (ev) => {
      const btn = ev.target;
      const name = newForm.querySelector('#nf2-name').value.trim();
      if (!name) return;
      const memberIds = pickedMembers(newForm, 'nf2');
      if (memberIds.length &&
          !confirm(`Share “${name}” 👥?\n\nMembers get YOUR current progress on this title, and it stays synced from here on.`))
        return;
      btn.disabled = true;
      try {
        const folder = await api(`/folders?${userQ()}`, { method: 'POST',
          body: { name, member_ids: memberIds } });
        await api(`/folders/${folder.id}/items?${userQ()}`, { method: 'PUT',
          body: { item_id: item.id, member: true } });
        await loadFolders();
        item.folders = [...(item.folders || []), folder.id];
        toast(folder.shared ? 'Folder created — progress now syncs 👥' : 'Folder created and added');
        renderDetail(sheet, mediaType, d, fallbackTitle);
        if (tab === 'library') renderLibrary();
      } catch { btn.disabled = false; toast('Could not create folder'); }
    };
    newForm.querySelector('#nf2-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') newForm.querySelector('#nf2-create').click();
    });
    sheet.appendChild(newForm);
  }

  /* games: platforms instead of streaming providers */
  if (mediaType === 'game') {
    if ((d.platforms || []).length) {
      sheet.appendChild(el('<h3 class="section">Where to play</h3>'));
      const row = el('<div class="chips" style="flex-wrap:wrap;overflow:visible"></div>');
      for (const p of d.platforms)
        row.appendChild(el(`<span class="chip" style="cursor:default">${esc(p.platform.name)}</span>`));
      sheet.appendChild(row);
    }
    if (d.description_raw) {
      sheet.appendChild(el('<h3 class="section">About</h3>'));
      sheet.appendChild(el(`<p class="overview">${esc(d.description_raw.slice(0, 600))}${d.description_raw.length > 600 ? '…' : ''}</p>`));
    }
    return;
  }

  /* streaming availability */
  const provWrap = el('<div></div>');
  provWrap.appendChild(el(`<h3 class="section">Where to watch (${esc(S.region)})</h3>`));
  const p = (d['watch/providers'] && d['watch/providers'].results || {})[S.region];
  if (!p || (!p.flatrate && !p.rent && !p.buy && !p.free)) {
    provWrap.appendChild(el('<div class="prov-note">No streaming info for your region — change it in ⚙ settings.</div>'));
  } else {
    for (const [k, label] of [['free', 'Free'], ['flatrate', 'Stream'], ['rent', 'Rent'], ['buy', 'Buy']]) {
      if (!p[k]) continue;
      provWrap.appendChild(el(`<div class="prov-label">${label}</div>`));
      const row = el('<div class="providers"></div>');
      for (const pr of p[k]) {
        row.appendChild(el(`<div class="provider">
          <img loading="lazy" src="${IMG}w92${pr.logo_path}" alt="">
          <span>${esc(pr.provider_name)}</span></div>`));
      }
      provWrap.appendChild(row);
    }
    provWrap.appendChild(el(`<div class="prov-note">Availability data by <a href="${p.link}" target="_blank" rel="noopener">JustWatch via TMDB</a>.</div>`));
  }
  sheet.appendChild(provWrap);

  if (d.overview) {
    sheet.appendChild(el('<h3 class="section">Overview</h3>'));
    sheet.appendChild(el(`<p class="overview">${esc(d.overview)}</p>`));
  }

  /* seasons & episodes (tv, in library) */
  if (mediaType === 'tv' && item) {
    sheet.appendChild(el('<h3 class="section">Episodes</h3>'));
    const seasonsBox = el('<div></div>');
    sheet.appendChild(seasonsBox);
    renderSeasons(seasonsBox, d, item);
  } else if (mediaType === 'tv' && !item) {
    sheet.appendChild(el('<div class="prov-note">Add to library to track episodes.</div>'));
  }
}

async function renderSeasons(box, d, item) {
  box.innerHTML = '<div class="spin">Loading watch history…</div>';
  let watchedList;
  try { watchedList = await api(`/library/${item.id}/episodes?${userQ()}`); }
  catch { box.innerHTML = '<div class="prov-note">Couldn’t load watch history.</div>'; return; }
  const watched = new Set(watchedList.map(e => `${e.season}:${e.episode}`));

  box.innerHTML = '';
  const seasons = (d.seasons || []).filter(s => s.season_number > 0); // skip specials by default
  for (const s of seasons) {
    const sec = el(`<div class="season">
      <div class="season-head">
        <span class="chev">›</span>
        <span class="name">${esc(s.name)}</span>
        <span class="count"></span>
      </div>
      <div class="season-body"></div>
    </div>`);
    const head = sec.querySelector('.season-head');
    const body = sec.querySelector('.season-body');
    const countEl = sec.querySelector('.count');

    const updateCount = () => {
      const w = [...watched].filter(k => k.startsWith(s.season_number + ':')).length;
      countEl.textContent = `${w}/${s.episode_count || '?'}`;
      countEl.style.color = (s.episode_count && w >= s.episode_count) ? 'var(--green)' : '';
    };
    updateCount();

    head.onclick = async () => {
      sec.classList.toggle('open');
      if (!sec.classList.contains('open') || body.dataset.loaded) return;
      body.innerHTML = '<div class="spin">Loading episodes…</div>';
      let eps;
      const ck = `${d.id}:${s.season_number}`;
      try {
        eps = seasonCache[ck] || (await tmdb(`/tv/${d.id}/season/${s.season_number}`)).episodes || [];
        seasonCache[ck] = eps;
      } catch (e) { body.innerHTML = ''; return handleTmdbError(e, body); }

      body.innerHTML = '';
      body.dataset.loaded = '1';

      const setEps = async (pairs, on) => {
        try {
          await api(`/library/${item.id}/episodes?${userQ()}`, { method: 'PUT', body: {
            episodes: pairs.map(([se, ep]) => ({ season: se, episode: ep })), watched: on } });
          pairs.forEach(([se, ep]) => on ? watched.add(`${se}:${ep}`) : watched.delete(`${se}:${ep}`));
          return true;
        } catch { toast('Failed to save — is the Pi up?'); return false; }
      };

      const act = el(`<div class="season-actions">
        <button class="btn" data-a="all">Mark season watched</button>
        <button class="btn" data-a="none">Clear</button></div>`);
      act.querySelector('[data-a=all]').onclick = async () => {
        if (await setEps(eps.map(e => [s.season_number, e.episode_number]), true)) refresh();
      };
      act.querySelector('[data-a=none]').onclick = async () => {
        if (await setEps(eps.map(e => [s.season_number, e.episode_number]), false)) refresh();
      };
      body.appendChild(act);

      const rows = [];
      for (const e of eps) {
        const key = `${s.season_number}:${e.episode_number}`;
        const row = el(`<div class="ep">
          <span class="num">E${e.episode_number}</span>
          <span class="name">${esc(e.name || 'Episode ' + e.episode_number)}</span>
          <span class="check">✓</span></div>`);
        row.onclick = async () => {
          const on = !watched.has(key);
          if (await setEps([[s.season_number, e.episode_number]], on)) refresh();
        };
        rows.push([row, key]);
        body.appendChild(row);
      }
      function refresh() {
        rows.forEach(([row, key]) => row.classList.toggle('watched', watched.has(key)));
        updateCount();
      }
      refresh();
    };
    box.appendChild(sec);
  }
}

/* ============================================================ profiles */
function openProfilePicker(closable = true) {
  const bd = document.getElementById('sheet-backdrop');
  const sheet = document.getElementById('sheet');
  bd.classList.add('open');
  sheet.innerHTML = `
    <div class="grabber"></div>
    <h2 style="margin-bottom:4px">Who's watching?</h2>
    <p class="hint" style="margin-bottom:16px">The library is shared — episode progress is yours.</p>
    <div id="profile-list"></div>
    <div class="field" style="margin-top:14px">
      <label>Add a person</label>
      <div style="display:flex;gap:8px">
        <input id="new-profile" type="text" maxlength="30" placeholder="Name" style="flex:1">
        <button class="btn primary" id="add-profile">Add</button>
      </div>
    </div>`;
  if (closable) sheet.prepend(closeBtn());
  const list = sheet.querySelector('#profile-list');
  for (const u of USERS) {
    const b = el(`<button class="profile-btn ${USER && USER.id === u.id ? 'active' : ''}">${esc(u.name)}</button>`);
    b.onclick = () => selectUser(u);
    list.appendChild(b);
  }
  if (!USERS.length) list.appendChild(el('<p class="hint" style="margin-bottom:10px">No profiles yet — add yourselves below.</p>'));
  const input = sheet.querySelector('#new-profile');
  sheet.querySelector('#add-profile').onclick = async () => {
    const name = input.value.trim();
    if (!name) return;
    try {
      const u = await api('/users', { method: 'POST', body: { name } });
      USERS.push(u);
      selectUser(u);
    } catch { toast('Could not add profile (name taken?)'); }
  };
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') sheet.querySelector('#add-profile').click();
  });
  if (!closable) bd.onclick = null; // must pick someone
}

function selectUser(u) {
  USER = u;
  localStorage.setItem('watchpi_user', String(u.id));
  updateProfileChip();
  closeSheet();
  showTab('library');
  checkNewEpisodes();
}

/* ============================================================ new episodes
   On open: tell the Pi "I'm here", get back when this profile last opened
   the app, then ask TMDB (browser-side) which followed shows aired episodes
   since then. */
async function checkNewEpisodes() {
  if (!USER || !S.key) return;
  let prev;
  try { prev = (await api(`/users/${USER.id}/seen`, { method: 'PUT', body: {} })).previous_open_at; }
  catch { return; }
  if (!prev) return;                       // first open — nothing to compare
  const prevDate = prev.slice(0, 10);
  try { if (!library.length) await loadLibrary(); } catch { return; }
  const shows = library.filter(i => i.media_type === 'tv' && !i.stopped);
  if (!shows.length) return;
  const found = [];
  await Promise.all(shows.map(async s => {
    try {
      const ck = `tv:${s.tmdb_id}`;
      const d = detailCache[ck] || await tmdb(`/tv/${s.tmdb_id}`, { append_to_response: 'watch/providers' });
      detailCache[ck] = d;
      const le = d.last_episode_to_air;
      if (le && le.air_date && le.air_date >= prevDate)
        found.push({ text: `${s.title} S${le.season_number}E${le.episode_number}` });
    } catch { /* one failed lookup shouldn't kill the rest */ }
  }));
  if (found.length) {
    NEW_EPISODES = found;
    toast(`🔔 New episodes: ${found.map(f => f.text).join(', ')}`);
    if (tab === 'library') renderLibrary();
  }
}

/* ============================================================ settings */
function openSettings() {
  const bd = document.getElementById('sheet-backdrop');
  const sheet = document.getElementById('sheet');
  bd.classList.add('open');
  sheet.innerHTML = `
    <div class="grabber"></div>
    <h2 style="margin-bottom:16px">Settings</h2>
    <div class="field">
      <label>TMDB API key</label>
      <input id="set-key" type="text" value="${esc(S.key)}" placeholder="v3 key or v4 read token"
             autocomplete="off" spellcheck="false">
      <div class="hint">Free at <a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener">themoviedb.org → Settings → API</a>.
      Saved on the Pi — shared by every device on your network.</div>
    </div>
    <div class="field">
      <label>Region for streaming availability</label>
      <input id="set-region" type="text" maxlength="2" value="${esc(S.region)}"
             style="text-transform:uppercase" placeholder="US">
      <div class="hint">Two-letter country code, e.g. US, AR, ES, DE.</div>
    </div>
    <div class="field">
      <label>RAWG API key (optional — for video games)</label>
      <input id="set-rawg" type="text" value="${esc(S.rawgKey)}" placeholder="leave empty to skip games"
             autocomplete="off" spellcheck="false">
      <div class="hint">Free at <a href="https://rawg.io/apidocs" target="_blank" rel="noopener">rawg.io/apidocs</a>.
      Adds a Games section to search and a Games filter in the library.</div>
    </div>
    <div class="btnrow">
      <button class="btn primary" id="set-save">Save</button>
      <button class="btn" onclick="closeSheet()">Cancel</button>
    </div>`;
  sheet.prepend(closeBtn());
  document.getElementById('set-save').onclick = async () => {
    const btn = document.getElementById('set-save');
    btn.disabled = true;
    try {
      const cfg = await api('/config', { method: 'PUT', body: {
        tmdb_key: document.getElementById('set-key').value.trim(),
        region: (document.getElementById('set-region').value || 'US').toUpperCase(),
        rawg_key: document.getElementById('set-rawg').value.trim(),
      }});
      S.key = cfg.tmdb_key; S.region = cfg.region; S.rawgKey = cfg.rawg_key || '';
      detailCache = {}; // region affects providers
      closeSheet();
      toast('Saved to the Pi');
      if (!USER) setTimeout(() => openProfilePicker(false), 300);
    } catch { btn.disabled = false; toast('Failed to save — is the Pi up?'); }
  };
  for (const id of ['set-key', 'set-region', 'set-rawg'])
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('set-save').click();
    });
}

/* ============================================================ boot */
(async () => {
  await Promise.all([loadConfig(), loadUsers()]);
  showTab('library');
  if (!S.key) setTimeout(openSettings, 400);
  else if (!USER) setTimeout(() => openProfilePicker(false), 200);
  else checkNewEpisodes();
})();
</script>
